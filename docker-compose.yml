version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arena-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arena_clash}
      POSTGRES_USER: ${POSTGRES_USER:-arena_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置密码}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/procedures.sql:/docker-entrypoint-initdb.d/02-procedures.sql
      - ./sql/triggers.sql:/docker-entrypoint-initdb.d/03-triggers.sql
      - ./sql/sample_data.sql:/docker-entrypoint-initdb.d/04-sample_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arena_admin}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arena-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:?}

  backend:
    build: ./backend
    container_name: arena-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-arena_admin}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-arena_clash}
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: arena-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
