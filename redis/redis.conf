# ===========================================
# Redis 配置 - Arena Clash
# 密码通过 docker-compose command 参数传入
# ===========================================

# 持久化 - AOF
appendonly yes
appendfsync everysec

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 网络
bind 0.0.0.0
protected-mode yes
